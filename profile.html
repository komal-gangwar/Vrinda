<!-- profile.html (fragment) -->
 <div class="profilehu">
<div class="card">
  <div class="profile-header">
    <div class="profile-info">
      <div class="profile-icon avatar" id="profileIcon"></div>
      <div class="name-email">
        <div class="name"></div>
        <div class="email"></div>
      </div>
    </div>
    <img src="images/edit.png" alt="Edit" id="edithu" class="edit-image">
  </div>

  <div class="info-section">
    <div class="info-label">Bus</div>
    <div class="info-value bus">Edit profile to set bus</div>
    <div class="info-label">Stop</div>
    <div class="info-value stop">Edit profile to set stop</div>
  </div>

  <div class="logout">
    <img src="images/logout.png" alt="Logout" class="logout-image">
    <div class="logout-text">Logout</div>
  </div>
</div>
</div>
<button id="load-edit"
        hx-get="editprofile.html"
        hx-target="#main-content"
        hx-swap="innerHTML"
        style="display: block;">
</button>

<script>
   document.getElementById("profileIcon").textContent = getInitials(userFullName);
   
 function data() {
  fetch('backend/getUserData.php')
    .then(response => response.json())
    .then(data => {
        console.log(data);
      if (data.error) {
        alert(data.error);
        return;
      }

      document.querySelector('.name').textContent = data.name;
      document.querySelector('.email').textContent = data.email;
      if(data.bus_number+1){
      document.querySelector('.info-value.bus').textContent = data.bus_number;}
      
      if(data.stops+1){
        document.querySelector('.info-value.stop').textContent = data.stops;}
    })
    .catch(error => {
      console.error('Error fetching data:', error);
    });
};
data(); 
document.querySelector(".edit-image").addEventListener("click", () => {
  document.getElementById('load-edit').click();
});
document.querySelector(".logout").addEventListener("click", () => {
  document.getElementById('logout').click();
});

</script>
