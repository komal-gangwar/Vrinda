    <script>

      function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) return parts.pop().split(';').shift();
  return null;
}

const userFullName = getCookie("dname");

function getInitials(name) {
  const names = name.trim().split(" ");
  if (names.length === 1) return names[0][0].toUpperCase();
  return (names[0][0] + names[1][0]).toUpperCase(); // Optional: show two initials
}

// Set initials in profile icon (only if cookie is found)
if (userFullName) {
  document.getElementById("profileIcon").textContent = getInitials(userFullName);
} else {
  window.location.href = "dlogin.html";// fallback
}
document.getElementById("dr").innerHTML=userFullName;

    </script>
