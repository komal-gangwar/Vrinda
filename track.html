        // Load dummy stops

        const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleBtn');

    function toggleSidebar() {
      sidebar.classList.add('open');
      toggleBtn.style.display = 'none';
    }

    // Slide to close (mouse and touch)
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    sidebar.addEventListener('touchstart', startDrag);
    sidebar.addEventListener('mousedown', startDrag);

    sidebar.addEventListener('touchmove', onDrag);
    sidebar.addEventListener('mousemove', onDrag);

    sidebar.addEventListener('touchend', endDrag);
    sidebar.addEventListener('mouseup', endDrag);
    sidebar.addEventListener('mouseleave', endDrag);

    function startDrag(e) {
      isDragging = true;
      startX = e.touches ? e.touches[0].clientX : e.clientX;
    }

    function onDrag(e) {
      if (!isDragging) return;
      currentX = e.touches ? e.touches[0].clientX : e.clientX;
      const deltaX = currentX - startX;
      if (deltaX < -50) {
        sidebar.classList.remove('open');
        toggleBtn.style.display = 'block';
        isDragging = false;
      }
    }

    function endDrag() {
      isDragging = false;
    }
