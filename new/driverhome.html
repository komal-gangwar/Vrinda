<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bus Selection</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            /* Equal top and bottom spacing */
            background-color: #f9f9f9;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Full viewport height */
            box-sizing: border-box;
        }

        .card {
            background: #fff;
            max-width: 400px;
            width: 100%;
            padding: 30px 30px 40px 30px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }




        .profile {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: #C7C7CB;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            margin-right: 16px;
        }

        .user-info {
            flex-grow: 1;
        }

        .user-info h2 {
            margin: 0;
            font-size: 22px;
        }

        .user-info p {
            margin: 2px 0 0 0;
            color: #999;
            font-size: 14px;
        }


        label {
            display: block;
            margin-top: 20px;
            font-size: 20px;
            font-weight: 500;
        }

        select {
            width: calc(100% - 10px);
            padding: 16px 36px 16px 12px;
            margin-top: 20px;
            margin-right: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 18px;
            background-color: #f9f9f9;
            color: #666;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;

            background-image: url("data:image/svg+xml;utf8,<svg width='13' height='9' viewBox='0 0 13 9' xmlns='http://www.w3.org/2000/svg'><path d='M6.5 9L12.9952 0H0.00480938L6.5 9Z' fill='%23D9D9D9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 13px 9px;
        }

        button {
            background-color: #4285F4;
            color: white;
            border: none;
            width: calc(100% - 10px);
            padding: 16px 36px 16px 12px;
            margin-top: 20px;
            margin-right: 10px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        select:invalid {
            color: #C7C7CB;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="profile">
            <div class="avatar">D</div>
            <div class="user-info">
                <h2>Driver</h2>
            </div>
        </div>

        <select id="bus" id="busDropdown" required>
            <option value=""  disabled selected>Select a Bus</option>
        </select>

        <select id="route" id="routeDropdown" required>
            <option value="" disabled selected>Select Route</option>
        </select>
        <button  id="notifyBtn" id="startBtn" onclick="sendNotification(); noti();" disabled>Notify</button>
    </div>

    <script src="js/driver.js"></script>
    <script>
      fetch('backend/bus.php')
        .then(response => response.json())
        .then(buses => {
          const dropdown = document.getElementById('busDropdown');
          dropdown.innerHTML = '<option value="" disabled selected>Select your bus</option>';
          buses.forEach(bus => {
            const option = document.createElement('option');
            option.value = bus.BUS_ID;  // value is bus ID
            option.textContent = bus.BUS_NUMBER;  // label is bus number
            dropdown.appendChild(option);
          });
        })
        .catch(error => {
          console.error('Error fetching buses:', error);
          const dropdown = document.getElementById('busDropdown');
          dropdown.innerHTML = '<option disabled>Error loading buses</option>';
        });
    </script>
    <script>
        fetch('backend/route.php')
          .then(response => response.json())
          .then(routes => {
            const dropdown = document.getElementById('routeDropdown');
            dropdown.innerHTML = '<option value="" disabled selected>Select your bus</option>';
            routes.forEach(route => {
              const option = document.createElement('option');
              option.value = route.ROUTE_ID;  // value is bus ID
              option.textContent = route.DESCRIPTION;  // label is bus number
              dropdown.appendChild(option);
            });
          })
          .catch(error => {
            console.error('Error fetching buses:', error);
            const dropdown = document.getElementById('busDropdown');
            dropdown.innerHTML = '<option disabled>Error loading buses</option>';
          });
      </script>

</body>

</html>
