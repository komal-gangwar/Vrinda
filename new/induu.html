<!DOCTYPE html>
<html>
<head>
  <title>Choose Location - MapMyIndia</title>
  <meta charset="utf-8" />
  <style>
    #mapModal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.7);
    }

    #mapContainer {
      width: 80%;
      height: 80%;
      margin: 5% auto;
      background: white;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #closeBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 5px 10px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>

  <!-- MapMyIndia SDK -->
  <script src="https://apis.mapmyindia.com/advancedmaps/v1/1334b332ebba9c99ff4870d193ba88dc/map_load?v=1.5"></script>
</head>
<body>

  <h2>Click the button to choose a location</h2>
  <button onclick="openMapModal()">Choose Location</button>

  <!-- Modal -->
  <div id="mapModal">
    <div id="mapContainer">
      <button id="closeBtn" onclick="closeMapModal()">X</button>
      <div id="map"></div>
    </div>
  </div>

  <script>
    let map, marker;

    function openMapModal() {
      document.getElementById('mapModal').style.display = 'block';

      if (!map) {
        map = new MapmyIndia.Map('map', {
          center: [28.6139, 77.2090], // Default to Delhi
          zoom: 13
        });

        map.on('click', function (e) {
          const lat = e.latlng.lat.toFixed(6);
          const lng = e.latlng.lng.toFixed(6);

          if (marker) {
            marker.setLatLng([lat, lng]);
          } else {
            marker = L.marker([lat, lng]).addTo(map);
          }

          console.log("Selected Location:", lat, lng);

          // Close modal after selecting location
          closeMapModal();
        });
      }
    }

    function closeMapModal() {
      document.getElementById('mapModal').style.display = 'none';
    }
  </script>

</body>
</html>
